{% extends 'trainee/base.html' %}

{% block content %}
<h2>Trainee Profile: {{ trainee.name }}</h2>

<div class="profile-card">
    {% if trainee.image %}
        <img src="{{ trainee.image.url }}" alt="{{ trainee.name }}" style="width:200px;">
    {% else %}
        <p>No profile image uploaded.</p>
    {% endif %}

    <p><strong>Email:</strong> {{ trainee.email }}</p>
    <p><strong>Enrolled Course:</strong> {{ trainee.course_id.title }}</p>
</div>

<hr>
<a href="{% url 'trainee_list' %}">Back to All Trainees</a>
{% endblock %}
