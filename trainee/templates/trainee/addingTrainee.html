{% extends 'trainee/base.html' %}

{% block content %}
<h2>Add New Trainee</h2>

<!-- The action is empty so it posts to the same URL, and method must be POST -->
<form method="POST">
    {% csrf_token %} <!-- Django security tag required for all forms -->
    
    <label>Name:</label><br>
    <input type="text" name="name" required><br><br>
    
    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>
    
    <button type="submit">Save Trainee</button>
</form>

<br>
<a href="{% url 'trainee_list' %}">Back to List</a>
{% endblock %}
